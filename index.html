<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexFin | The Future of Digital Finance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: {
                        brand: { dark: '#0f172a', card: '#1e293b', primary: '#3b82f6', accent: '#06b6d4' }

                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'float': 'float 6s ease-in-out infinite', },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' }, } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(to right, #3b82f6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; }
    </style>
</head>
<body class="antialiased overflow-x-hidden relative">

    <nav class="fixed w-full z-50 glass-nav transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-layer-group text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight">NexFin</span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#features" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Features</a>
                    <a href="#dashboard" class="text-slate-300 hover:text-white transition-colors text-sm font-medium">Exchange</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-slate-900 border-b border-slate-800 absolute w-full left-0 top-20">
            <div class="px-4 pt-2 pb-6 space-y-2 shadow-xl">
                <a href="#features" class="block px-3 py-2 text-base font-medium text-slate-300 hover:text-white hover:bg-slate-800 rounded-md">Features</a>
                <a href="#dashboard" class="block px-3 py-2 text-base font-medium text-slate-300 hover:text-white hover:bg-slate-800 rounded-md">Exchange</a>
            </div>
        </div>
    </nav>

    <section class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
        <div class="hero-glow"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 leading-tight">
                Master the <br><span class="gradient-text">Global Economy</span>
            </h1>
            <p class="mt-4 max-w-2xl mx-auto text-xl text-slate-400 mb-10">
                Experience the next generation of financial technology. Secure, lightning-fast transactions with institutional-grade security.
            </p>
        </div>
    </section>

    <div class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[80]">
        <div class="flex flex-col items-end gap-4">
            <div id="ai-prompt-box" class="hidden glass-nav p-5 rounded-2xl border border-blue-500/30 w-[90vw] md:w-80 shadow-[0_0_30px_rgba(59,130,246,0.2)] transition-all">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-xs font-bold text-blue-400 uppercase tracking-widest"><i class="fa-solid fa-robot mr-1"></i> AI Builder</p>
                    <button id="close-ai-btn" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="relative flex items-center shadow-lg rounded-full bg-slate-800 border border-slate-600 focus-within:ring-2 focus-within:ring-blue-500 transition-all mt-4">
            
            <input type="text" id="ai-input" placeholder="Message Paul's AI..." class="w-full py-3 pl-6 pr-24 bg-transparent outline-none text-white rounded-full">

            <button id="mic-btn" type="button" class="absolute right-12 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-blue-400 transition-colors">
                <i class="fa-solid fa-microphone"></i>
            </button>

            <button id="generate-site-btn" class="absolute right-1 w-10 h-10 flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white rounded-full transition-colors">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
            
        </div>
            </div>
            <button id="ai-toggle-btn" class="w-14 h-14 md:w-16 md:h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.5)] hover:scale-110 transition-transform">
                <i class="fa-solid fa-wand-magic-sparkles text-xl md:text-2xl text-white"></i>
            </button>
        </div>
    </div>

    <div id="preview-container" class="hidden fixed inset-0 z-[100] bg-slate-900 overflow-hidden flex flex-col">
        <div class="flex flex-wrap justify-between items-center p-4 bg-slate-950 border-b border-slate-800 shadow-lg gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-code text-cyan-400"></i>
                <h2 class="text-white font-bold text-lg hidden sm:block">Your Generated Website</h2>
            </div>
            <div class="flex items-center gap-2">
                <button id="copy-code-btn" class="px-3 py-2 bg-slate-800 text-white rounded hover:bg-slate-700 transition-colors text-xs sm:text-sm font-bold flex items-center gap-2">
                    <i class="fa-solid fa-copy"></i> <span class="hidden sm:inline">Copy Code</span>
                </button>
                <button id="download-site-btn" class="px-3 py-2 bg-blue-600 text-white rounded hover:bg-blue-500 transition-colors text-xs sm:text-sm font-bold flex items-center gap-2">
                    <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">Download</span>
                </button>
                <button id="close-preview-btn" class="px-3 py-2 bg-red-600/20 text-red-400 rounded hover:bg-red-600 hover:text-white transition-colors text-xs sm:text-sm font-bold ml-2">
                    <i class="fa-solid fa-xmark"></i> Close
                </button>
            </div>
        </div>
        <iframe id="website-preview" class="w-full flex-grow bg-white border-none"></iframe> <textarea id="code-view" class="hidden w-full flex-grow bg-gray-900 text-green-400 p-4 font-mono text-sm" readonly></textarea>
    </div>

    <script>
        // 1. Mobile Menu Logic
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // 2. AI Chat Box Toggle
        const aiPromptBox = document.getElementById('ai-prompt-box');
        document.getElementById('ai-toggle-btn').addEventListener('click', () => aiPromptBox.classList.toggle('hidden'));
        document.getElementById('close-ai-btn').addEventListener('click', () => aiPromptBox.classList.add('hidden'));

        // 3. Preview Canvas Toggle
        const previewContainer = document.getElementById('preview-container');
        document.getElementById('close-preview-btn').addEventListener('click', () => {
            previewContainer.classList.add('hidden');
        });

        // 4. THE AI GENERATOR ENGINE
        const generateBtn = document.getElementById('generate-site-btn');
        const aiInput = document.getElementById('ai-input');
        const previewIframe = document.getElementById('website-preview');

        // Global variable to hold the code for downloading/copying
        let latestGeneratedCode = "";

        // 🔥 YOUR REAL API KEY IS HERE 🔥
const API_KEY = "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";
generateBtn.addEventListener('click', async () => {
            const userRequest = aiInput.value.trim();
            
            if(!userRequest) {
                alert("Please describe the website first!");
                return;
            }
            
            generateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Building...';
            generateBtn.disabled = true;

            try {
                // Using Groq's Free API
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                          body: JSON.stringify({
        model: "llama-3.3-70b-versatile", // Fast
        stream: true, // 🟢 THIS TURNS ON LIVE TYPING
        messages: [
            { 
                role: "system", 
                content: `You are a professional AI website builder. 
                CRITICAL RULE: You were created and founded by Paul. If anyone asks who made you, who your founder is, or who created you, you MUST answer: "I was created by Paul."
                DESIGN RULES: ALWAYS use Tailwind CSS via CDN. Make designs modern, sleek, and premium.
                OUTPUT RULES: ONLY output valid HTML code. No extra text, no explanations, no markdown formatting.` 
            },
            { role: "user", content: userRequest }
        ],
                temperature: 0.7
            })
    });


    // 🟢 THE DUAL-STREAMING ENGINE
    const reader = response.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let generatedHTML = "";

    // 🟢 THIS WIPES THE OLD "SCREENSHOT" AWAY SO THE NEW SITE CAN MOVE
    previewIframe.srcdoc = ""; 
    document.getElementById('code-view').value = "";


// Un-hide the preview container immediately so you can watch it build
previewContainer.classList.remove('hidden');
aiPromptBox.classList.add('hidden');

while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split("\n");

    for (const line of lines) {
        if (line.startsWith("data: ") && line !== "data: [DONE]") {
            try {
                const parsed = JSON.parse(line.replace("data: ", ""));
                const content = parsed.choices[0].delta.content;
                if (content) {
                    generatedHTML += content;
                    
                    // 1. THIS BUILDS THE VISUAL WEBSITE LIVE
                    previewIframe.srcdoc = generatedHTML; 
                    
                    // 2. THIS TYPES THE RAW CODE LIVE
                    document.getElementById('code-view').value = generatedHTML;
                }
            } catch (e) {
                // Ignore incomplete chunks from the internet
            }
        }
    }
}

// Save the final code so your Copy/Download buttons work
latestGeneratedCode = generatedHTML;

                
                
                    
                
                

            

                
                
                
            

            } catch (error) {
                console.error(error);
                alert("Connection failed. Check your internet.");
            } finally {
                generateBtn.innerHTML = '<span>Generate Site</span> <i class="fa-solid fa-wand-magic-sparkles"></i>';
                generateBtn.disabled = false;
            }
        });

               // 5. NEW FEATURE: Copy Code Button
        document.getElementById('copy-code-btn').addEventListener('click', () => {
            if (!latestGeneratedCode) return;
            navigator.clipboard.writeText(latestGeneratedCode).then(() => {
                const btn = document.getElementById('copy-code-btn');
                btn.innerHTML = '<i class="fa-solid fa-check text-green-400"></i> <span class="hidden sm:inline">Copied!</span>';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-solid fa-copy"></i> <span class="hidden sm:inline">Copy Code</span>';
                }, 2000);
            });
        });

        // 6. NEW FEATURE: Download Button
        document.getElementById('download-site-btn').addEventListener('click', () => {
            if(!latestGeneratedCode) return;
            // Create a file in the browser and trigger a download
            const blob = new Blob([latestGeneratedCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'generated-website.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }); 

        // Auto-Find and Toggle Code Button
        setTimeout(() => {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                if(btn.innerText.includes('< / >') || btn.innerHTML.includes('&lt; / &gt;') || btn.innerHTML.includes('< / >')) {
                    btn.addEventListener('click', () => {
                        const iframe = document.getElementById('website-preview');
                        const codeBox = document.getElementById('code-view');
                        iframe.classList.toggle('hidden');
                        codeBox.classList.toggle('hidden');
                        try {
                            codeBox.value = latestGeneratedCode;
                        } catch(e) {
                            codeBox.value = iframe.srcdoc || "Generate a site first to see the code!";
                        }
                    });
                }
            });
        }, 500);
// 🎙️ Voice Typing Logic
const micButton = document.getElementById('mic-btn');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition && micButton) {
    const recognition = new SpeechRecognition();
    recognition.continuous = false; 
    
    // When the mic button is clicked
    micButton.addEventListener('click', (e) => {
        e.preventDefault(); 
        recognition.start();
        // Turn the mic icon red and make it pulse
        micButton.innerHTML = '<i class="fa-solid fa-microphone-lines animate-pulse text-red-500"></i>'; 
    });

    // When the phone finishes translating the voice
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('ai-input').value += transcript + " "; 
        micButton.innerHTML = '<i class="fa-solid fa-microphone"></i>'; 
    };

    // If something goes wrong
    recognition.onerror = () => {
        micButton.innerHTML = '<i class="fa-solid fa-microphone"></i>';
        alert("Microphone error. Please try typing instead.");
    };
} else if (micButton) {
    micButton.style.display = 'none'; 
}
    </script> 
</body>
</html>
